<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bengal Welding" />
    <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <title>Bengal Welding Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000000;
        color: #FFFFFF;
        overflow-x: hidden;
        max-width: 100vw;
      }
      /* Custom Scrollbar for brand feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #000000;
      }
      ::-webkit-scrollbar-thumb {
        background: #333333;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #F2C200;
      }
      /* Fix for white flash during navigation */
      html {
        background-color: #000000;
        overflow-x: hidden;
      }
      /* React DatePicker dark theme */
      .react-datepicker-dark {
        background-color: #111111 !important;
        border-color: #333333 !important;
        font-family: 'Inter', sans-serif !important;
      }
      .react-datepicker-dark .react-datepicker__header {
        background-color: #1A1A1A !important;
        border-color: #333333 !important;
      }
      .react-datepicker-dark .react-datepicker__current-month,
      .react-datepicker-dark .react-datepicker__day-name,
      .react-datepicker-dark .react-datepicker__day {
        color: #FFFFFF !important;
      }
      .react-datepicker-dark .react-datepicker__day:hover,
      .react-datepicker-dark .react-datepicker__day--keyboard-selected {
        background-color: #333333 !important;
        color: #FFFFFF !important;
      }
      .react-datepicker-dark .react-datepicker__day--selected {
        background-color: #F2C200 !important;
        color: #000000 !important;
      }
      .react-datepicker-dark .react-datepicker__month-dropdown,
      .react-datepicker-dark .react-datepicker__year-dropdown {
        background-color: #111111 !important;
        border-color: #333333 !important;
        color: #FFFFFF !important;
      }
      .react-datepicker-dark .react-datepicker__month-option,
      .react-datepicker-dark .react-datepicker__year-option {
        color: #FFFFFF !important;
      }
      .react-datepicker-dark .react-datepicker__month-option--selected_month,
      .react-datepicker-dark .react-datepicker__month-option--selected_month:hover,
      .react-datepicker-dark .react-datepicker__year-option--selected_year,
      .react-datepicker-dark .react-datepicker__year-option--selected_year:hover {
        background-color: #333333 !important;
        color: #FFFFFF !important;
      }
      .react-datepicker-dark .react-datepicker__month-option:hover,
      .react-datepicker-dark .react-datepicker__year-option:hover {
        background-color: #333333 !important;
      }
      /* Month/year dropdown triggers (the boxes showing "March", "2026") */
      .react-datepicker-dark .react-datepicker__month-select,
      .react-datepicker-dark .react-datepicker__year-select {
        color: #FFFFFF !important;
        background-color: #1A1A1A !important;
        border-color: #333333 !important;
        -webkit-appearance: none;
        appearance: none;
      }
      .react-datepicker-dark .react-datepicker__month-select option,
      .react-datepicker-dark .react-datepicker__year-select option {
        background-color: #111111 !important;
        color: #FFFFFF !important;
      }
      /* Read-view mode (alternative dropdown UI) */
      .react-datepicker-dark .react-datepicker__month-read-view,
      .react-datepicker-dark .react-datepicker__year-read-view {
        color: #FFFFFF !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
