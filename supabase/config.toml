# Disable gateway JWT verification for admin Edge Functions.
# These functions validate the JWT manually with admin.auth.getUser(token)
# and check admin role, so security is preserved.
[functions.create-employee]
verify_jwt = false

[functions.list-users]
verify_jwt = false

[functions.create-service-request-checkout]
verify_jwt = false

[functions.finalize-service-request-payment]
verify_jwt = false

[functions.create-customer]
verify_jwt = false
